<div class="container">
  <h2>Lista de Tareas</h2>
  <ul>
    <li *ngFor="let tarea of listaTareas; let i = index">
      {{ tarea }}
      <button (click)="eliminarTarea(i)">Eliminar</button>
    </li>
  </ul>

  <input type="text" [(ngModel)]="nuevaTarea" placeholder="Nueva tarea" />
  <button (click)="agregarTarea()">Agregar</button>
</div>
