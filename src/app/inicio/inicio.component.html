<!--
  ============================================================================
  TEMPLATE CON NUEVA SINTAXIS DE ANGULAR 17+ (Control Flow)
  ============================================================================
  
  Angular 17 introdujo una nueva sintaxis de control de flujo:
  
  ANTES (directivas estructurales):     AHORA (built-in control flow):
  *ngIf="condicion"                     @if (condicion) { }
  *ngFor="let item of items"            @for (item of items; track item) { }
  *ngSwitch                             @switch (valor) { @case ... }
  
  VENTAJAS DE LA NUEVA SINTAXIS:
  - Mejor rendimiento (no requiere importar CommonModule)
  - Sintaxis más limpia y familiar (similar a otros lenguajes)
  - @empty block para listas vacías
  - 'track' obligatorio mejora el rendimiento de listas
  
  TRACK en @for:
  - track $index: Usa el índice como identificador (simple pero menos eficiente)
  - track item.id: Usa una propiedad única (recomendado para objetos)
  - track item: Usa el objeto completo (para primitivos como strings)
-->

<div class="container">
  <h2>Lista de Tareas</h2>
  
  <ul>
    <!--
      @for - Nueva sintaxis para iterar sobre arrays
      
      Sintaxis: @for (variable of array; track expresion) { contenido }
      
      - $index: Variable implícita con el índice actual (0, 1, 2...)
      - $first, $last, $even, $odd: Variables implícitas adicionales
      - track: OBLIGATORIO - indica cómo Angular identifica cada elemento
              para optimizar actualizaciones del DOM
    -->
    @for (tarea of listaTareas; track $index) {
      <li>
        {{ tarea }}
        <!-- 
          $index está disponible automáticamente dentro del @for
          Equivale al antiguo: let i = index
        -->
        <button (click)="eliminarTarea($index)">Eliminar</button>
      </li>
    }
    
    <!--
      @empty - Bloque opcional que se muestra cuando el array está vacío
      Reemplaza el patrón: *ngIf="lista.length === 0"
    -->
    @empty {
      <li class="text-muted">No hay tareas. ¡Agrega una!</li>
    }
  </ul>

  <!--
    [(ngModel)] - Two-way data binding (NO cambió)
    Sigue requiriendo FormsModule en los imports del componente
  -->
  <input type="text" [(ngModel)]="nuevaTarea" placeholder="Nueva tarea" />
  
  <!--
    (click) - Event binding (NO cambió)
    Llama al método agregarTarea() del componente
  -->
  <button (click)="agregarTarea()">Agregar</button>
</div>
