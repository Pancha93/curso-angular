<button (click)="incrementar()">Incrementar</button>
<button (click)="decrementar()">Decrementar</button>

<h1>El mensaje enviado desde el padre es: </h1>
<p>{{recibeHijo | miPipePersonalizado }}</p>

<div>
    <label for="entrada">Escribe un mensaje para el padre:</label>
    <input type="text" id="entrada" [(ngModel)]="mensajeHijo" />
  <button type="button" (click)="enviarMensajeAlPadre()">Enviar mensaje al padre</button>
</div>
